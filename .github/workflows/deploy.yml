name: Build & Publish Latest

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '!skipci')
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./src/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build & Publish Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.package_version.outputs.version }}
            ghcr.io/${{ github.repository }}:v14-custom

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package_version.outputs.version }}
          name: Release v${{ steps.package_version.outputs.version }}
          body: |
            Automated Release for version ${{ steps.package_version.outputs.version }}
            
            - Docker Image: `ghcr.io/${{ github.repository }}:${{ steps.package_version.outputs.version }}`
            - Full Dual-Stack IPv6 Support
            - Automated Port Forwarding for IPv4 & IPv6
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
